<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trade Journal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap');
:root{
  --bg:#0b0f18;--s1:#111827;--s2:#1a2236;--border:#1e2d45;
  --acc:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --gem:#4285f4;--cld:#d97706;
  --text:#e2e8f0;--t2:#94a3b8;--t3:#4b6088;
  --font:'Noto Sans JP',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;}

header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--s1);}
.logo{font-size:15px;font-weight:700;color:#fff;}.logo span{color:var(--acc);}
#ds{font-size:11px;color:var(--t3);font-family:var(--mono);}

nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:9px 4px 8px;text-align:center;font-size:10px;font-weight:700;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;}
.tab .ti{font-size:15px;display:block;margin-bottom:1px;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}

.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;padding:12px 14px 72px;display:none;}
.page.on{display:block;}
.page::-webkit-scrollbar{width:2px;}
.page::-webkit-scrollbar-thumb{background:var(--border);}

.cash-row{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;}
.cash-row label{font-size:11px;color:var(--t3);white-space:nowrap;}
.cash-row input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:18px;font-weight:700;text-align:right;outline:none;min-width:0;}
.cash-row span{font-size:12px;color:var(--t3);}

.sum-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.sb{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px;}
.sl{font-size:9px;color:var(--t3);margin-bottom:3px;letter-spacing:.04em;}
.sv{font-family:var(--mono);font-size:15px;font-weight:700;}
.ss{font-size:9px;color:var(--t3);margin-top:2px;}
.up{color:var(--green);}.dn{color:var(--red);}

.hrow{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.hrt{display:flex;justify-content:space-between;align-items:center;}
.hnm{font-size:14px;font-weight:700;}.hcd{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:1px;}
.hpnl{font-family:var(--mono);font-size:16px;font-weight:700;}.hpct{font-size:10px;text-align:right;margin-top:1px;}
.hmeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.hbg{font-size:11px;background:var(--s2);padding:3px 8px;border-radius:5px;font-family:var(--mono);}
.hlines{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:7px;}
.hl{background:var(--s2);border-radius:7px;padding:6px;text-align:center;}
.hll{font-size:9px;color:var(--t3);margin-bottom:2px;}.hlv{font-family:var(--mono);font-size:12px;font-weight:600;}
.hl.s .hlv{color:var(--red);}.hl.c .hlv{color:var(--acc);}.hl.t .hlv{color:var(--green);}
.abar{font-size:11px;font-weight:700;padding:4px 8px;border-radius:5px;margin-bottom:6px;text-align:center;}
.as{background:rgba(239,68,68,.15);color:var(--red);}.ag{background:rgba(16,185,129,.15);color:var(--green);}.aw{background:rgba(245,158,11,.15);color:var(--yellow);}
.cpin{background:transparent;border:none;color:var(--acc);font-family:var(--mono);font-size:11px;font-weight:700;width:56px;text-align:right;outline:none;border-bottom:1px dashed var(--border);}
.delbtn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 0;margin-top:4px;}

.fl{font-size:11px;color:var(--t2);font-weight:600;display:block;margin-bottom:4px;letter-spacing:.04em;}
.fi{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:15px;padding:9px 11px;outline:none;transition:border-color .15s;margin-bottom:10px;}
.fi:focus{border-color:var(--acc);}.fi::placeholder{color:var(--t3);font-size:13px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{width:100%;border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;padding:12px;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btnb{background:linear-gradient(135deg,#1d4ed8,#0891b2);}
.btns{background:linear-gradient(135deg,#dc2626,#7c3aed);}
select.fi{appearance:none;-webkit-appearance:none;}

.trow{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--s1);border-radius:9px;margin-bottom:6px;}
.tside{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.tb{background:rgba(16,185,129,.15);color:var(--green);}.ts{background:rgba(239,68,68,.15);color:var(--red);}
.tinfo{flex:1;}.tnm{font-size:13px;font-weight:600;}.tmeta{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:1px;}
.tpnl{font-family:var(--mono);font-size:13px;font-weight:700;}

/* 振り返り */
.rev-btn{width:100%;background:linear-gradient(135deg,#1e3a5f,#0e4d3a);border:1px solid var(--border);border-radius:11px;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;padding:14px;cursor:pointer;margin-bottom:12px;transition:opacity .15s;}
.rev-btn:disabled{opacity:.5;}

/* AIカード */
.rcard{background:var(--s1);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:10px;}
.rhdr{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--border);}
.rbody{padding:13px;}

/* AI2段表示（Gemini + Claude並列）*/
.dual-body{display:flex;flex-direction:column;gap:0;}
.ai-pane{padding:12px 13px;}
.ai-pane+.ai-pane{border-top:1px solid var(--border);}
.ai-pane-hdr{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.ai-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;letter-spacing:.04em;}
.pill-g{background:rgba(66,133,244,.15);color:var(--gem);}
.pill-c{background:rgba(217,119,6,.15);color:var(--cld);}
.ai-text{font-size:13px;line-height:1.85;color:#cbd5e1;white-space:pre-wrap;word-break:break-word;}

/* チャット */
#page-chat{padding:0;display:flex;flex-direction:column;}
.cscroll{flex:1;overflow-y:auto;padding:12px 14px 8px;}
.cmsg{display:flex;gap:7px;margin-bottom:8px;align-items:flex-start;}
.cmsg.u{flex-direction:row-reverse;}
.cb{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:9px 12px;font-size:13px;line-height:1.7;max-width:86%;white-space:pre-wrap;word-break:break-word;}
.cmsg.u .cb{background:rgba(37,99,235,.18);border-color:rgba(59,130,246,.25);}
.cav{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--s2);}

/* 合議吹き出し（Gemini + Claude 2段） */
.dual-bubble{background:var(--s1);border:1px solid var(--border);border-radius:11px;overflow:hidden;max-width:90%;margin-bottom:8px;}
.db-pane{padding:9px 12px;font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.db-pane+.db-pane{border-top:1px solid var(--border);}
.db-hdr{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;display:inline-block;margin-bottom:5px;}
.dhg{background:rgba(66,133,244,.15);color:var(--gem);}
.dhc{background:rgba(217,119,6,.15);color:var(--cld);}

.cbar{display:flex;gap:7px;padding:8px 12px;background:var(--s1);border-top:1px solid var(--border);}
.cin{flex:1;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:14px;padding:9px 11px;outline:none;resize:none;transition:border-color .15s;max-height:90px;}
.cin:focus{border-color:var(--acc);}
.csend{width:40px;height:40px;background:var(--acc);border:none;border-radius:9px;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.csend:disabled{opacity:.4;}

/* チャットモード切替 */
.mode-row{display:flex;gap:6px;padding:6px 12px;background:var(--s1);border-bottom:1px solid var(--border);}
.mode-btn{flex:1;padding:6px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;transition:.15s;}
.mode-btn.on{background:var(--s2);color:var(--text);border-color:var(--b2);}

@keyframes spin{to{transform:rotate(360deg);}}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
.ldg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t3);padding:4px 0;}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:13px;}
.empty .ei{font-size:36px;margin-bottom:8px;}
.sec-lbl{font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.06em;margin-bottom:6px;}

/* コストバッジ */
.cost-note{font-size:10px;color:var(--t3);text-align:right;margin-bottom:8px;}
.cost-note span{background:var(--s2);padding:2px 7px;border-radius:5px;}
</style>
</head>
<body>

<header>
  <div class="logo">📒 Trade<span>Journal</span></div>
  <div id="ds"></div>
</header>

<nav>
  <div class="tab on" onclick="go('dash')"><span class="ti">📊</span>概況</div>
  <div class="tab" onclick="go('trade')"><span class="ti">💱</span>売買</div>
  <div class="tab" onclick="go('hold')"><span class="ti">💼</span>保有</div>
  <div class="tab" onclick="go('rev')"><span class="ti">🔍</span>振り返り</div>
  <div class="tab" onclick="go('chat')"><span class="ti">💬</span>相談</div>
</nav>

<div class="pages">

<!-- 概況 -->
<div class="page on" id="page-dash">
  <div class="cash-row">
    <label>残金</label>
    <input id="cashIn" type="number" placeholder="0" oninput="saveCash()">
    <span>円</span>
  </div>
  <div class="sum-row">
    <div class="sb"><div class="sl">評価額</div><div class="sv" id="sv">¥0</div><div class="ss" id="sct">0銘柄</div></div>
    <div class="sb"><div class="sl">含み損益</div><div class="sv" id="sp">¥0</div><div class="ss" id="spp">0.0%</div></div>
    <div class="sb"><div class="sl">実現損益</div><div class="sv" id="sr">¥0</div><div class="ss" id="stc">0件</div></div>
  </div>
  <div id="dh"></div>
  <div id="dt" style="margin-top:8px"></div>
</div>

<!-- 売買 -->
<div class="page" id="page-trade">
  <select class="fi" id="ta" onchange="onAct()">
    <option value="buy">🟢 買い（新規）</option>
    <option value="sell">🔴 売り（決済）</option>
  </select>
  <div class="frow">
    <div><label class="fl">証券コード</label><input class="fi" id="tc" type="text" inputmode="numeric" placeholder="3778" maxlength="5" style="margin-bottom:0"></div>
    <div><label class="fl">銘柄名</label><input class="fi" id="tn" type="text" placeholder="さくらインターネット" style="margin-bottom:0"></div>
  </div>
  <div class="frow" style="margin-top:8px">
    <div><label class="fl">株数</label><input class="fi" id="tsh" type="number" inputmode="numeric" placeholder="100" style="margin-bottom:0"></div>
    <div><label class="fl">約定価格（円）</label><input class="fi" id="tp" type="number" inputmode="decimal" placeholder="2850" style="margin-bottom:0"></div>
  </div>
  <div id="buyEx" style="margin-top:8px">
    <div class="frow">
      <div><label class="fl">損切りライン</label><input class="fi" id="tsl" type="number" inputmode="decimal" placeholder="2420" style="margin-bottom:0"></div>
      <div><label class="fl">利確目標</label><input class="fi" id="ttgt" type="number" inputmode="decimal" placeholder="4130" style="margin-bottom:0"></div>
    </div>
    <div style="margin-top:8px"><label class="fl">メモ（任意）</label><input class="fi" id="tmemo" placeholder="エントリー理由など" style="margin-bottom:0"></div>
  </div>
  <button class="btn btnb" id="tBtn" style="margin-top:10px" onclick="doTrade()">💱 買いを記録する</button>
  <div class="sec-lbl" style="margin-top:14px">売買履歴</div>
  <div id="tHist"></div>
</div>

<!-- 保有 -->
<div class="page" id="page-hold">
  <div id="hList"></div>
</div>

<!-- 振り返り -->
<div class="page" id="page-rev">
  <div class="cost-note">
    <span>🤖 Gemini: 情報収集（安価）　🧠 Claude: 戦略分析</span>
  </div>
  <button class="rev-btn" id="revBtn" onclick="doRev()">
    🔍 今日の振り返りを開始する<br>
    <span style="font-size:11px;opacity:.75">🤖Gemini×3セクション + 🧠Claude×戦略アドバイス</span>
  </button>
  <div id="revOut"></div>
</div>

<!-- 相談チャット -->
<div class="page" id="page-chat">
  <div class="mode-row">
    <button class="mode-btn on" id="modeGC" onclick="setMode('gc')">🤝 合議（Gemini+Claude）</button>
    <button class="mode-btn" id="modeG" onclick="setMode('g')">🤖 Gemini速報</button>
    <button class="mode-btn" id="modeC" onclick="setMode('c')">🧠 Claude戦略</button>
  </div>
  <div class="cscroll" id="cMsgs">
    <div class="cmsg">
      <div class="cav">🤝</div>
      <div class="cb">こんにちは！合議モードでお答えします。<br>🤖<b>Gemini</b>が最新市場情報を、🧠<b>Claude</b>が戦略・判断をお伝えします。<br>右上でモードを切替えられます。</div>
    </div>
  </div>
  <div class="cbar">
    <textarea class="cin" id="cinp" placeholder="質問を入力…" rows="1"
      oninput="autoH(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doChat();}"></textarea>
    <button class="csend" id="csend" onclick="doChat()">↑</button>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ★ APIキー（ここを書き換えてください）
const GEMINI_KEY    = "AIzaSyDVB3ddn1aP7H8laYa5PVVD7J3CWkHcHgg";
const ANTHROPIC_KEY = "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";

// ストレージ
const KH="tj_h4",KT="tj_t4",KC="tj_c4";
const ld=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let H=ld(KH,[]),T=ld(KT,[]),cash=ld(KC,0);

const D=new Date(),TODAY=D.toISOString().slice(0,10);
document.getElementById("ds").textContent=
  `${D.getFullYear()}/${String(D.getMonth()+1).padStart(2,"0")}/${String(D.getDate()).padStart(2,"0")}(${["日","月","火","水","木","金","土"][D.getDay()]})`;
document.getElementById("cashIn").value=cash||"";

// タブ
function go(id){
  const ids=["dash","trade","hold","rev","chat"];
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("on",ids[i]===id));
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("on",p.id==="page-"+id));
  if(id==="dash")rDash();
  if(id==="hold")rHold();
  if(id==="trade")rTH();
}

function saveCash(){cash=parseFloat(document.getElementById("cashIn").value)||0;sv(KC,cash);calcS();}

function calcS(){
  let cost=0,val=0;
  for(const h of H){cost+=h.bp*h.sh;val+=(h.cp||h.bp)*h.sh;}
  const pnl=val-cost,pct=cost>0?pnl/cost*100:0;
  const rel=T.filter(t=>t.a==="sell").reduce((s,t)=>s+(t.pnl||0),0);
  const f=v=>(v>=0?"¥":"-¥")+Math.abs(Math.round(v)).toLocaleString();
  const c=v=>v>=0?"up":"dn";
  set("sv",f(val),c(val));set("sct",H.length+"銘柄","");
  set("sp",f(pnl),c(pnl));set("spp",(pnl>=0?"+":"")+pct.toFixed(2)+"%",c(pnl));
  set("sr",f(rel),c(rel));document.getElementById("stc").textContent=T.length+"件";
}
function set(id,v,cls){const e=document.getElementById(id);e.textContent=v;e.className="sv"+(cls?" "+cls:"");}

function rDash(){
  calcS();
  const he=document.getElementById("dh");
  he.innerHTML=H.length?`<div class="sec-lbl">保有銘柄</div>`+H.map(h=>hHTML(h,true)).join(""):`<div class="empty"><div class="ei">💼</div>保有銘柄なし</div>`;
  const te=document.getElementById("dt");
  const rec=[...T].reverse().slice(0,3);
  te.innerHTML=rec.length?`<div class="sec-lbl">直近の売買</div>`+rec.map(tHTML).join(""):"";
}

function hHTML(h,compact){
  const cp=h.cp||h.bp,pnl=(cp-h.bp)*h.sh,pct=(cp-h.bp)/h.bp*100;
  const cls=pnl>=0?"up":"dn";
  const toS=h.sl?((cp-h.sl)/cp*100).toFixed(1):null;
  let al="";
  if(h.sl&&cp<=h.sl)al=`<div class="abar as">🚨 損切りライン到達</div>`;
  else if(h.tgt&&cp>=h.tgt)al=`<div class="abar ag">🎯 利確目標到達</div>`;
  else if(toS&&parseFloat(toS)<=3)al=`<div class="abar aw">⚠️ 損切りまで残り${toS}%</div>`;
  return `<div class="hrow">${al}
    <div class="hrt">
      <div><div class="hnm">${h.nm}</div><div class="hcd">${h.cd}｜${h.dt}</div></div>
      <div><div class="hpnl ${cls}">${pnl>=0?"¥+":"-¥"}${Math.abs(Math.round(pnl)).toLocaleString()}</div>
           <div class="hpct ${cls}">${pct>=0?"+":""}${pct.toFixed(2)}%</div></div>
    </div>
    <div class="hmeta">
      <span class="hbg">${h.sh}株</span>
      <span class="hbg">買 ${h.bp.toLocaleString()}円</span>
      <span class="hbg">現 <input class="cpin" type="number" value="${cp}" onchange="uCP('${h.cd}',this.value)">円</span>
    </div>
    ${!compact?`<div class="hlines">
      <div class="hl s"><div class="hll">損切り</div><div class="hlv">${h.sl?h.sl.toLocaleString()+"円":"－"}</div></div>
      <div class="hl c"><div class="hll">現在値</div><div class="hlv">${cp.toLocaleString()}円</div></div>
      <div class="hl t"><div class="hll">目標</div><div class="hlv">${h.tgt?h.tgt.toLocaleString()+"円":"－"}</div></div>
    </div>${h.memo?`<div style="font-size:11px;color:var(--t3);margin-top:5px">📝${h.memo}</div>`:""}
    <button class="delbtn" onclick="delH('${h.cd}')">🗑 削除</button>`:""}
  </div>`;
}

function tHTML(t){
  const ib=t.a==="buy";
  const ps=t.pnl!=null?(t.pnl>=0?"+¥":"-¥")+Math.abs(Math.round(t.pnl)).toLocaleString():"";
  return `<div class="trow">
    <div class="tside ${ib?"tb":"ts"}">${ib?"買":"売"}</div>
    <div class="tinfo"><div class="tnm">${t.nm} <span style="color:var(--t3)">${t.cd}</span></div>
    <div class="tmeta">${t.p.toLocaleString()}円×${t.sh}株　${t.dt}</div></div>

function uCP(cd,v){const h=H.find(h=>h.cd===cd);if(h){h.cp=parseFloat(v)||h.bp;sv(KH,H);calcS();}}

function onAct(){
  const b=document.getElementById("ta").value==="buy";
  document.getElementById("buyEx").style.display=b?"":"none";
  document.getElementById("tBtn").textContent=b?"💱 買いを記録する":"💰 売りを記録する";
  document.getElementById("tBtn").className="btn "+(b?"btnb":"btns");
}
function doTrade(){
  const a=document.getElementById("ta").value;
  const cd=document.getElementById("tc").value.trim();
  const nm=document.getElementById("tn").value.trim();
  const sh=parseFloat(document.getElementById("tsh").value);
  const p=parseFloat(document.getElementById("tp").value);
  if(!cd||!nm||!sh||!p){toast("⚠️ コード・銘柄名・株数・価格は必須");return;}
  if(a==="buy"){
    const sl=parseFloat(document.getElementById("tsl").value)||null;
    const tgt=parseFloat(document.getElementById("ttgt").value)||null;
    const memo=document.getElementById("tmemo").value.trim();
    const idx=H.findIndex(h=>h.cd===cd);
    if(idx>=0){const ex=H[idx],tot=ex.sh+sh;H[idx]={...ex,sh:tot,bp:Math.round((ex.bp*ex.sh+p*sh)/tot*10)/10};}
    else H.push({cd,nm,sh,bp:p,sl,tgt,memo,dt:TODAY,cp:p});
    sv(KH,H);cash=Math.max(0,cash-p*sh);sv(KC,cash);
    document.getElementById("cashIn").value=cash||"";
    T.push({id:Date.now(),a,cd,nm,sh,p,dt:TODAY});sv(KT,T);
    toast(`✅ ${nm} 買い記録`);
  }else{
    const h=H.find(h=>h.cd===cd);let pnl=null;
    if(h){pnl=(p-h.bp)*sh;if(h.sh<=sh)H=H.filter(hh=>hh.cd!==cd);else h.sh-=sh;sv(KH,H);}
    cash+=p*sh;sv(KC,cash);
    document.getElementById("cashIn").value=cash||"";
    T.push({id:Date.now(),a,cd,nm,sh,p,dt:TODAY,pnl});sv(KT,T);
    const ps=pnl!=null?` 損益${pnl>=0?"+":"-"}¥${Math.abs(Math.round(pnl)).toLocaleString()}`:"";
    toast(`✅ ${nm} 売り記録${ps}`);
  }
  ["tc","tn","tsh","tp","tsl","ttgt","tmemo"].forEach(id=>document.getElementById(id).value="");
  rTH();
}
function rTH(){document.getElementById("tHist").innerHTML=T.length?[...T].reverse().slice(0,30).map(tHTML).join(""):`<div class="empty"><div class="ei">📋</div>履歴なし</div>`;}

// ポートフォリオ文字列
function pfS(){
  if(!H.length)return"保有銘柄なし（現金のみ）";
  const hs=H.map(h=>{const cp=h.cp||h.bp,pct=((cp-h.bp)/h.bp*100).toFixed(1);
    return `${h.cd} ${h.nm}: ${h.sh}株 買値${h.bp}円 現値${cp}円(${pct>=0?"+":""}${pct}%) 損切${h.sl||"未"}→目標${h.tgt||"未"}`;
  }).join("\n");
  const td=T.filter(t=>t.dt===TODAY);
  const ts=td.length?"\n本日売買: "+td.map(t=>`${t.a==="buy"?"買":"売"} ${t.nm} ${t.p}円×${t.sh}株`).join(", "):"";
  return hs+ts+`\n残金: ${Math.round(cash).toLocaleString()}円`;
}

async function doChat(){
  const inp=document.getElementById("cinp");
  const txt=inp.value.trim();if(!txt)return;
  inp.value="";autoH(inp);
  document.getElementById("csend").disabled=true;
  addMsg("u",txt);

  const pf=pfS();
  const gemSys=`あなたは日本株専門のアナリストです。Google検索で最新情報を確認しながら回答してください。
ユーザーのポートフォリオ: ${pf}

  const cldSys=`あなたは運用歴25年の日本株専門シニアFMです。
ユーザーのポートフォリオ: ${pf}
この情報を踏まえ、戦略・判断・リスク管理の観点から率直・具体的にアドバイスしてください。`;

  // ローディング表示
  const ldEl=document.createElement("div");ldEl.className="cmsg";
  const modeIcon=chatMode==="gc"?"🤝":chatMode==="g"?"🤖":"🧠";
  ldEl.innerHTML=`<div class="cav">${modeIcon}</div><div class="cb"><div class="ldg"><div class="spin"></div><span>考え中...</span></div></div>`;
  document.getElementById("cMsgs").appendChild(ldEl);sC();

  try{
    if(chatMode==="g"){
      gemHist.push({role:"user",parts:[{text:txt}]});
      const r=await callGemini(txt,gemSys,gemHist.slice(-8));
      ldEl.remove();addAIMsg("g",r);
      gemHist.push({role:"model",parts:[{text:r}]});
    }else if(chatMode==="c"){
      cldHist.push({role:"user",content:txt});
      const r=await callClaude(txt,cldSys,cldHist.slice(-10));
      ldEl.remove();addAIMsg("c",r);
      cldHist.push({role:"assistant",content:r});
    }else{
      // 合議：Gemini + Claude 並列
      gemHist.push({role:"user",parts:[{text:txt}]});
      cldHist.push({role:"user",content:txt});
      const [gr,cr]=await Promise.all([
        callGemini(txt,gemSys,gemHist.slice(-8)).catch(e=>`⚠️ ${e.message}`),
        callClaude(txt,cldSys,cldHist.slice(-10)).catch(e=>`⚠️ ${e.message}`),

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}

// ══ Gemini API（Google Search grounding）══
async function callGemini(prompt, sys, history){
  const contents=[];
  if(history&&history.length>0){
    // 履歴の最後のユーザーメッセージがpromptと同じ場合は除外して追加
    contents.push(...history.slice(0,-1));
  }
  contents.push({role:"user",parts:[{text:sys?`${sys}\n\n${prompt}`:prompt}]});
  const body={
    contents,
    tools:[{googleSearch:{}}],
    generationConfig:{maxOutputTokens:1500},
  };
  const r=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,
    {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
  );
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("\n").trim()||"応答なし";
}

// ══ Claude API（Anthropic）══
async function callClaude(prompt,sys,history){
  const msgs=history?[...history.slice(0,-1),{role:"user",content:prompt}]:[{role:"user",content:prompt}];
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,messages:msgs};
  if(sys)body.system=sys;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01"},
    body:JSON.stringify(body),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()||"応答なし";
}
