<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>朝会 - Trade Journal</title>
<meta name="theme-color" content="#0b0f18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="朝会">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- PWA: manifest を inline data URL で埋め込み -->
<link rel="manifest" id="pwaManifest">
<style>
:root{
  --bg:#0b0f18;--s1:#111827;--s2:#1a2236;--border:#1e2d45;
  --acc:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;
  --text:#e2e8f0;--t2:#94a3b8;--t3:#4b6088;
  --font:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  display:flex;flex-direction:column;overflow-x:hidden;
}
button,input,textarea,select{font-family:inherit;}

/* ─── ヘッダー ─── */
header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s1);flex-shrink:0;
}
.h-title{font-size:15px;font-weight:700;}
.h-title span{color:var(--acc);}
.h-date{font-size:11px;color:var(--t3);font-family:var(--mono);}
.h-btn{
  background:transparent;border:none;color:var(--t2);font-size:20px;
  cursor:pointer;padding:4px 8px;
}
.h-btn:hover{color:var(--text);}

/* ─── メイン ─── */
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 100px;}

/* ─── マクロアラート ─── */
.macro-alert{
  background:linear-gradient(135deg,#7c2d12,#9a3412);
  border:1px solid #ea580c;border-radius:12px;
  padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;
}
.macro-alert.info{background:linear-gradient(135deg,#1e3a8a,#1e40af);border-color:#3b82f6;}
.macro-alert.warn{background:linear-gradient(135deg,#7c2d12,#9a3412);border-color:#ea580c;}
.macro-alert .a-icon{font-size:24px;line-height:1;flex-shrink:0;}
.macro-alert .a-body{flex:1;min-width:0;}
.macro-alert .a-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.macro-alert .a-text{font-size:11px;color:#fff;opacity:.9;line-height:1.45;}
.macro-alert .a-dismiss{
  background:rgba(0,0,0,.3);border:none;color:#fff;
  border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;margin-top:8px;
}

/* ─── セクション（折りたたみ） ─── */
.sec{
  background:var(--s1);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
}
.sec-hdr{
  padding:13px 14px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
}
.sec-hdr-l{display:flex;align-items:center;gap:8px;}
.sec-num{
  background:var(--s2);color:var(--t2);font-size:11px;font-weight:700;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sec-num.done{background:var(--green);color:#fff;}
.sec-num.active{background:var(--acc);color:#fff;}
.sec-title{font-size:14px;font-weight:700;}
.sec-badge{
  font-size:10px;color:var(--t3);
  background:var(--s2);padding:2px 8px;border-radius:10px;font-family:var(--mono);
}
.sec-badge.active{background:var(--acc);color:#fff;}
.sec-badge.done{background:var(--green);color:#fff;}
.sec-badge.error{background:var(--red);color:#fff;}
.sec-arrow{color:var(--t3);font-size:12px;transition:transform .2s;}
.sec.open .sec-arrow{transform:rotate(180deg);}
.sec-body{padding:0 14px 14px;display:none;}
.sec.open .sec-body{display:block;}
.sec-preview{padding:0 14px 12px;font-size:11px;color:var(--t3);}
.sec.open .sec-preview{display:none;}

/* ─── ① 地合い ─── */
.regime-card{display:flex;gap:12px;align-items:center;margin-bottom:10px;}
.regime-icon{font-size:36px;line-height:1;}
.regime-info{flex:1;}
.regime-name{font-size:18px;font-weight:700;}
.regime-name.normal{color:var(--green);}
.regime-name.caution{color:var(--yellow);}
.regime-name.storm{color:#fb923c;}
.regime-name.halt{color:var(--red);}
.regime-meta{font-size:11px;color:var(--t2);font-family:var(--mono);margin-top:2px;}
.regime-advice{
  background:var(--s2);border-left:3px solid var(--acc);
  padding:8px 10px;border-radius:6px;font-size:12px;line-height:1.5;color:var(--t2);
}
.regime-advice.warn{border-left-color:var(--yellow);}
.regime-advice.danger{border-left-color:var(--red);}

/* ─── ② 保有銘柄カード ─── */
.empty{
  text-align:center;padding:30px 12px;color:var(--t3);font-size:13px;
}
.empty .ei{font-size:36px;margin-bottom:10px;}
.h-card{
  background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:10px;transition:border-color .2s;
}
.h-card.judged{border-color:var(--green);background:#0f1d2e;}
.h-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.h-code-name{flex:1;min-width:0;}
.h-code{font-size:11px;color:var(--t3);font-family:var(--mono);}
.h-name{font-size:14px;font-weight:700;margin-top:1px;line-height:1.2;}
.h-price{text-align:right;flex-shrink:0;}
.h-cur{font-size:18px;font-weight:700;font-family:var(--mono);line-height:1;}
.h-chg{font-size:11px;font-family:var(--mono);margin-top:3px;}
.h-chg.up{color:var(--green);}
.h-chg.dn{color:var(--red);}

.h-meta{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
  background:var(--s1);border-radius:6px;padding:8px;margin-bottom:10px;
  font-size:10px;
}
.h-meta-item{text-align:center;}
.h-meta-lbl{color:var(--t3);margin-bottom:2px;}
.h-meta-val{font-family:var(--mono);font-weight:700;color:var(--text);}
.h-meta-val.dn{color:var(--red);}
.h-meta-val.up{color:var(--green);}

.h-judge-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.j-btn{
  background:var(--s1);color:var(--t2);border:1px solid var(--border);
  border-radius:8px;padding:10px 4px;font-size:11px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .15s;
}
.j-btn .ji{font-size:18px;}
.j-btn:active{transform:scale(.96);}
.j-btn.sel-hold{background:var(--green);color:#fff;border-color:var(--green);}
.j-btn.sel-cut{background:var(--red);color:#fff;border-color:var(--red);}
.j-btn.sel-sell{background:var(--purple);color:#fff;border-color:var(--purple);}

.h-judged-banner{
  background:var(--s1);border-radius:6px;padding:8px 10px;
  font-size:11px;color:var(--t2);text-align:center;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.h-judged-banner b{color:var(--text);}
.h-judged-banner .change-link{color:var(--acc);font-size:10px;margin-left:4px;}

/* 手動入力フォーム */
.h-add-row{
  display:grid;grid-template-columns:1fr 2fr 1fr 50px;gap:6px;margin-bottom:10px;
}
.h-add-row input{
  background:var(--s1);border:1px solid var(--border);color:var(--text);
  padding:8px;border-radius:6px;font-size:12px;font-family:var(--mono);
}
.h-add-row .add-btn{
  background:var(--acc);color:#fff;border:none;border-radius:6px;
  font-size:18px;font-weight:700;cursor:pointer;
}
.h-source-note{
  font-size:10px;color:var(--t3);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.h-source-note button{
  background:var(--s2);border:1px solid var(--border);color:var(--t2);
  padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;
}

/* ─── ③ 計画 ─── */
.plan-empty{text-align:center;padding:24px 12px;color:var(--t3);font-size:12px;}
.plan-gen-btn{
  width:100%;padding:12px;background:var(--acc);color:#fff;border:none;
  border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.plan-gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.plan-text{
  background:var(--s2);border-radius:8px;padding:14px;
  font-size:13px;line-height:1.7;color:var(--text);
  white-space:pre-wrap;word-wrap:break-word;
}
.plan-meta{font-size:10px;color:var(--t3);margin-top:8px;text-align:right;font-family:var(--mono);}
.plan-error{
  background:#3a1818;border:1px solid var(--red);border-radius:8px;
  padding:10px 12px;color:#fca5a5;font-size:12px;line-height:1.5;
}

/* ─── 完了ボタン ─── */
.done-btn-wrap{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 16px env(safe-area-inset-bottom, 12px);
  background:linear-gradient(to top, var(--bg) 65%, transparent);
  z-index:90;
}
.done-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:var(--acc);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .2s;
}
.done-btn:disabled{opacity:.4;cursor:not-allowed;}
.done-btn.completed{background:var(--green);}

/* ─── トースト ─── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--s2);color:var(--text);padding:10px 16px;border-radius:8px;
  font-size:12px;z-index:1000;border:1px solid var(--border);
  opacity:0;transition:opacity .25s;pointer-events:none;
  max-width:90%;text-align:center;
}
.toast.on{opacity:1;}

/* ─── モーダル ─── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-bg.on{display:flex;}
.modal{
  background:var(--s1);border-top-left-radius:16px;border-top-right-radius:16px;
  width:100%;max-width:480px;max-height:85vh;overflow-y:auto;
  padding:14px 16px env(safe-area-inset-bottom, 16px);
  border-top:1px solid var(--border);
}
.modal-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{
  background:transparent;border:none;color:var(--t2);font-size:22px;cursor:pointer;
}
.modal-sec{margin-bottom:18px;}
.modal-sec-title{
  font-size:11px;color:var(--t3);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:8px;font-weight:700;
}
.modal label{font-size:11px;color:var(--t2);display:block;margin-bottom:4px;}
.modal input[type=text],.modal input[type=password]{
  width:100%;background:var(--s2);border:1px solid var(--border);
  color:var(--text);padding:10px;border-radius:6px;font-size:12px;
  font-family:var(--mono);margin-bottom:8px;
}
.modal-btn{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:6px;font-size:12px;cursor:pointer;
  width:100%;text-align:left;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.modal-btn:hover{background:var(--border);}
.modal-btn.danger{color:#fca5a5;border-color:#7f1d1d;}
.modal-btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;}
.modal-btn .ki{font-size:14px;}

.history-item{
  background:var(--s2);border-radius:6px;padding:8px 10px;margin-bottom:6px;
  font-size:11px;
}
.history-item .hi-date{color:var(--t2);font-family:var(--mono);}
.history-item .hi-summary{margin-top:3px;color:var(--text);}

.api-status{font-size:10px;margin-top:4px;}
.api-status.set{color:var(--green);}
.api-status.unset{color:var(--yellow);}

/* ─── ローディング ─── */
.loading{display:inline-flex;gap:6px;align-items:center;color:var(--t3);font-size:12px;}
.loading::before{
  content:"";width:12px;height:12px;border:2px solid var(--border);
  border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── 全般 ─── */
.muted{color:var(--t3);}
.error{color:var(--red);font-size:11px;padding:8px;background:#3a1818;border-radius:6px;line-height:1.4;}
.error a{color:#fca5a5;}
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">🌅 <span>朝会</span></div>
    <div class="h-date" id="hDate"></div>
  </div>
  <button class="h-btn" id="settingsBtn" title="設定">⚙️</button>
</header>

<main>
  <div id="alertArea"></div>

  <!-- ① 地合い -->
  <div class="sec open" id="secMacro">
    <div class="sec-hdr" onclick="toggleSec('secMacro')">
      <div class="sec-hdr-l">
        <div class="sec-num active" id="numMacro">1</div>
        <div class="sec-title">地合い</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="sec-badge" id="badgeMacro">読込中</div>
        <div class="sec-arrow">▼</div>
      </div>
    </div>
    <div class="sec-preview" id="previewMacro">読込中...</div>
    <div class="sec-body" id="bodyMacro">
      <div class="loading">マクロ状態を取得中...</div>
    </div>
  </div>

  <!-- ② 保有銘柄 -->
  <div class="sec" id="secHoldings">
    <div class="sec-hdr" onclick="toggleSec('secHoldings')">
      <div class="sec-hdr-l">
        <div class="sec-num" id="numHoldings">2</div>
        <div class="sec-title">保有銘柄</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="sec-badge" id="badgeHoldings">-</div>
        <div class="sec-arrow">▼</div>
      </div>
    </div>
    <div class="sec-preview" id="previewHoldings">①完了後に展開</div>
    <div class="sec-body" id="bodyHoldings"></div>
  </div>

  <!-- ③ 今日の計画 -->
  <div class="sec" id="secPlan">
    <div class="sec-hdr" onclick="toggleSec('secPlan')">
      <div class="sec-hdr-l">
        <div class="sec-num" id="numPlan">3</div>
        <div class="sec-title">今日の計画</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="sec-badge" id="badgePlan">-</div>
        <div class="sec-arrow">▼</div>
      </div>
    </div>
    <div class="sec-preview" id="previewPlan">②完了後に生成</div>
    <div class="sec-body" id="bodyPlan">
      <div class="plan-empty">②保有銘柄の判定を完了すると、Claude が今日の計画を生成します</div>
    </div>
  </div>
</main>

<div class="done-btn-wrap">
  <button class="done-btn" id="doneBtn" disabled onclick="completeSession()">💾 朝会を完了する</button>
</div>

<!-- ─── 設定モーダル ─── -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">⚙️ 設定</div>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>

    <div class="modal-sec">
      <div class="modal-sec-title">🔑 API キー (v1 と共有)</div>

      <label>Claude (Anthropic) API Key</label>
      <input type="password" id="inpClaudeKey" placeholder="sk-ant-...">
      <div class="api-status" id="statClaudeKey"></div>

      <label style="margin-top:10px;">Gemini API Key (将来用)</label>
      <input type="password" id="inpGeminiKey" placeholder="AIzaSy...">
      <div class="api-status" id="statGeminiKey"></div>

      <button class="modal-btn primary" onclick="saveKeys()" style="margin-top:10px;justify-content:center;">
        💾 API キーを保存
      </button>
    </div>

    <div class="modal-sec">
      <div class="modal-sec-title">📋 朝会履歴</div>
      <div id="historyList">
        <div class="loading">読込中...</div>
      </div>
    </div>

    <div class="modal-sec">
      <div class="modal-sec-title">🛠 メンテナンス</div>
      <button class="modal-btn" onclick="exportHistory()">
        <span class="ki">📤</span>判定履歴を JSON でエクスポート
      </button>
      <button class="modal-btn" onclick="clearCache()">
        <span class="ki">🔄</span>キャッシュをクリア（再 fetch）
      </button>
      <button class="modal-btn danger" onclick="resetTodaySession()">
        <span class="ki">🗑</span>当日の判定をリセット
      </button>
    </div>

    <div class="modal-sec">
      <div class="modal-sec-title">ℹ️ アプリ情報</div>
      <div style="font-size:11px;color:var(--t2);line-height:1.6;">
        <div>バージョン: <b style="color:var(--text);">v0.2</b></div>
        <div>v1: <a href="trading_journal.html" style="color:var(--acc);">trading_journal.html</a></div>
        <div>データソース: <a href="https://github.com/hiroki300/trade-journal-data" target="_blank" style="color:var(--acc);">trade-journal-data</a></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════
//  trade-journal morning.html  v0.2 (Phase1 Step2)
// ════════════════════════════════════════════════════════════════════

// ── データソース ──
const DATA_BASE = "https://raw.githubusercontent.com/hiroki300/trade-journal-data/main";
const URLS = {
  macro_state:    `${DATA_BASE}/macro_state.json`,
  macro_history:  `${DATA_BASE}/macro_history.json`,
  latest_prices:  `${DATA_BASE}/latest_prices.json`,
  weekly_results: `${DATA_BASE}/weekly_results.json`,
};

// ── Anthropic API ──
const CLAUDE_API_URL = "https://api.anthropic.com/v1/messages";
const CLAUDE_MODEL = "claude-haiku-4-5-20251001";  // 安価で十分な性能

// ── キャッシュ ──
const CACHE_TTL = 5 * 60 * 1000;
const cache = new Map();
async function fetchJSON(url){
  const c = cache.get(url);
  if (c && Date.now() - c.t < CACHE_TTL) return c.data;
  const r = await fetch(url, {cache: "no-store"});
  if (!r.ok) throw new Error(`fetch ${url} failed: ${r.status}`);
  const data = await r.json();
  cache.set(url, {data, t: Date.now()});
  return data;
}

// ── localStorage ──
const LS = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set: (k, v) => { localStorage.setItem(k, JSON.stringify(v)); },
  raw: (k) => localStorage.getItem(k),
};
const K = {
  judgments:        "tjm_judgments",
  last_seen_macro:  "tjm_last_seen_macro",
  manual_holdings:  "tjm_manual_holdings",
  api_claude:       "tj_ck",
  api_gemini:       "tj_gk",
  last_plan:        "tjm_last_plan",
};

// ── 日付 ──
const D_NOW = new Date();
const TODAY = D_NOW.toISOString().slice(0,10);
const WD = ["日","月","火","水","木","金","土"][D_NOW.getDay()];
document.getElementById("hDate").textContent = `${TODAY} (${WD})`;

// ════════════════════════════════════════════════════════════════════
//  IndexedDB (Dexie 不使用、素の API)
// ════════════════════════════════════════════════════════════════════

const DB_NAME = "trade-journal-morning";
const DB_VERSION = 1;
let _dbPromise = null;

function openDB(){
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("daily_sessions")) {
        const store = db.createObjectStore("daily_sessions", {keyPath: "id", autoIncrement: true});
        store.createIndex("date", "date", {unique: false});
      }
    };
  });
  return _dbPromise;
}

async function dbAdd(storeName, value){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readwrite");
    const req = tx.objectStore(storeName).add(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbAll(storeName){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readonly");
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDeleteAll(storeName){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readwrite");
    const req = tx.objectStore(storeName).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove("on"), 2500);
}

function fmt(n, decimals=0){
  if (n == null || isNaN(n)) return "-";
  return Number(n).toLocaleString("ja-JP", {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}

function toggleSec(id){ document.getElementById(id).classList.toggle("open"); }

function code4to5(cd){
  const s = String(cd).trim();
  if (s.length === 5) return s;
  if (s.length === 4 && /^[\dA-Za-z]+$/.test(s)) return s + "0";
  return s;
}

function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

async function loadMacroAlert(){
  try {
    const history = await fetchJSON(URLS.macro_history);
    if (!Array.isArray(history) || history.length === 0) return;

    const lastSeen = LS.get(K.last_seen_macro, "1970-01-01T00:00:00+09:00");
    const newChanges = history.filter(h =>
      h.changed_at && h.changed_at > lastSeen && h.from
    );
    if (newChanges.length === 0) return;

    const latest = newChanges[newChanges.length - 1];
    const key = `${latest.from}->${latest.regime}`;
    const advice = REGIME_ADVICE_TRANSITION[key] || {
      icon: "🔔", title: `${latest.from?.toUpperCase()} → ${latest.regime?.toUpperCase()}`,
      text: latest.summary || "マクロレジームが変化しました。",
      level: "info"
    };

    const dt = new Date(latest.changed_at);
    const dtStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

    document.getElementById("alertArea").innerHTML = `
      <div class="macro-alert ${advice.level}">
        <div class="a-icon">${advice.icon}</div>

          <div class="a-title">${escapeHtml(advice.title)}</div>

async function loadHoldings(){
  let v1Data = [];
  try {
    const raw = LS.raw("tj_h5");
    if (raw) v1Data = JSON.parse(raw) || [];
  } catch(e) {
    console.warn("v1 holdings parse error:", e);
  }

  const manualData = LS.get(K.manual_holdings, []);
  const seen = new Set();
  HOLDINGS = [];
  for (const h of v1Data) {
    if (!h || !h.cd) continue;
    if (seen.has(h.cd)) continue;
    seen.add(h.cd);
    HOLDINGS.push({
      code: h.cd, name: h.nm || h.name || `(${h.cd})`,
      buy_price: h.bp, shares: h.sh, stop_loss: h.sl, target: h.tgt,
      type: h.type || "spot", source: "v1",
    });
  }
  for (const h of manualData) {
    if (!h || !h.code) continue;
    if (seen.has(h.code)) continue;
    seen.add(h.code);
    HOLDINGS.push({...h, source: "manual"});
  }

  try {
    PRICES = await fetchJSON(URLS.latest_prices);
  } catch(e) {
    console.warn("prices fetch failed:", e);
    PRICES = {};
  }

  renderHoldings();
}

function getPrice(code){
  const c5 = code4to5(code);
  return PRICES[c5] || PRICES[code] || null;
}

function renderHoldings(){
  const body = document.getElementById("bodyHoldings");
  const total = HOLDINGS.length;
  const judged = HOLDINGS.filter(h => JUDGMENTS[h.code]).length;
  const allFromV1 = HOLDINGS.length > 0 && HOLDINGS.every(h => h.source === "v1");

  const badge = document.getElementById("badgeHoldings");
  if (total === 0) {
    badge.className = "sec-badge"; badge.textContent = "0件";
  } else if (judged === total) {
    badge.className = "sec-badge done";
    badge.textContent = `✓ ${judged}/${total}`;
    document.getElementById("numHoldings").classList.remove("active");
    document.getElementById("numHoldings").classList.add("done");
    document.getElementById("numHoldings").textContent = "✓";
  } else {
    badge.className = "sec-badge active";
    badge.textContent = `${judged}/${total}`;
    document.getElementById("numHoldings").classList.add("active");
    document.getElementById("numHoldings").classList.remove("done");
    document.getElementById("numHoldings").textContent = "2";
  }

  document.getElementById("previewHoldings").textContent =
    total === 0 ? "保有銘柄なし" : `${total}銘柄 / 判定済 ${judged}`;

  let html = "";

  if (HOLDINGS.length > 0) {
    html += `
      <div class="h-source-note">
        ${allFromV1 ? "📦 v1 の保有データから自動取得" :
          HOLDINGS.some(h => h.source === "v1") ? "📦 v1 + 手動入力" : "✏️ 手動入力"}
        <button onclick="syncFromV1()" style="margin-left:auto;">🔄 再読込</button>
      </div>
    `;
  }

  if (HOLDINGS.length === 0) {
    html += `
      <div class="empty">
        <div class="ei">💼</div>
        保有銘柄が見つかりません<br>
        <span style="font-size:11px;color:var(--t3);">v1 で登録するか、下から手動入力してください</span>
      </div>
    `;
  } else {
    html += HOLDINGS.map(renderHoldingCard).join("");
  }

  html += `
    <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px;">
      <div style="font-size:11px;color:var(--t3);margin-bottom:6px;">＋ 朝会だけ追加（v1 には反映されません）</div>
      <div class="h-add-row">
        <input id="addCode"   type="text" placeholder="6196" maxlength="5">
        <input id="addName"   type="text" placeholder="銘柄名">
        <input id="addStop"   type="number" placeholder="損切">
        <button class="add-btn" onclick="addManualHolding()">＋</button>
      </div>
    </div>
  `;

  body.innerHTML = html;
}

function renderHoldingCard(h){
  const code5 = code4to5(h.code);
  const price = getPrice(h.code);
  const judged = JUDGMENTS[h.code];

  const curHtml = price ?
    `<div class="h-cur">${fmt(price.close, 1)}</div>
     <div class="h-chg ${price.change_pct >= 0 ? 'up' : 'dn'}">
       ${price.change_pct >= 0 ? '+' : ''}${fmt(price.change_pct, 2)}%
     </div>` :
    `<div class="h-cur muted">-</div><div class="h-chg muted">価格不明</div>`;

  let pnlHtml = `<div class="h-meta-val muted">-</div>`;
  if (price && h.buy_price) {
    const pnlPct = (price.close / h.buy_price - 1) * 100;
    pnlHtml = `<div class="h-meta-val ${pnlPct >= 0 ? 'up' : 'dn'}">${pnlPct >= 0 ? '+' : ''}${fmt(pnlPct, 1)}%</div>`;
  }

  let slPctHtml = "-", tgtPctHtml = "-";
  if (h.stop_loss) {
    if (price) {
      const slDist = (price.close / h.stop_loss - 1) * 100;
      slPctHtml = `${fmt(h.stop_loss, 0)}<br><span style="color:var(--t3);font-size:9px;">+${fmt(slDist,1)}%</span>`;
    } else slPctHtml = `${fmt(h.stop_loss, 0)}`;
  }
  if (h.target) {
    if (price) {
      const tgtDist = (h.target / price.close - 1) * 100;
      tgtPctHtml = `${fmt(h.target, 0)}<br><span style="color:var(--t3);font-size:9px;">+${fmt(tgtDist,1)}%</span>`;
    } else tgtPctHtml = `${fmt(h.target, 0)}`;
  }

  let judgeHtml;
  if (judged) {
    const labels = {hold:"継続保有", consider_cut:"損切検討", consider_sell:"利確検討"};
    const icons  = {hold:"✋", consider_cut:"⛔", consider_sell:"💰"};
    judgeHtml = `
      <div class="h-judged-banner" onclick="resetJudgment('${escapeHtml(h.code)}')">
        ${icons[judged.judgment]} 判定: <b>${labels[judged.judgment]}</b>
        <span class="change-link">変更</span>
      </div>
    `;
  } else {
    judgeHtml = `
      <div class="h-judge-btns">
        <button class="j-btn" onclick="setJudgment('${escapeHtml(h.code)}','hold')">
          <span class="ji">✋</span>継続保有
        </button>
        <button class="j-btn" onclick="setJudgment('${escapeHtml(h.code)}','consider_cut')">
          <span class="ji">⛔</span>損切検討
        </button>
        <button class="j-btn" onclick="setJudgment('${escapeHtml(h.code)}','consider_sell')">
          <span class="ji">💰</span>利確検討
        </button>
      </div>
    `;
  }

  return `
    <div class="h-card ${judged ? 'judged' : ''}" id="card-${escapeHtml(h.code)}">
      <div class="h-card-top">
        <div class="h-code-name">
          <div class="h-code">${code5} ${h.type === 'margin' ? '<span style="color:var(--yellow)">[信用]</span>' : ''}</div>
          <div class="h-name">${escapeHtml(h.name)}</div>
        </div>
        <div class="h-price">${curHtml}</div>
      </div>
      <div class="h-meta">
        <div class="h-meta-item">
          <div class="h-meta-lbl">買付/含損益</div>
          <div class="h-meta-val">${h.buy_price ? '¥'+fmt(h.buy_price,0) : '-'}</div>
          ${pnlHtml}
        </div>
        <div class="h-meta-item">
          <div class="h-meta-lbl">損切ライン</div>
          <div class="h-meta-val">${slPctHtml}</div>
        </div>
        <div class="h-meta-item">
          <div class="h-meta-lbl">目標</div>
          <div class="h-meta-val">${tgtPctHtml}</div>
        </div>
      </div>
      ${judgeHtml}
    </div>
  `;
}

function setJudgment(code, judgment){
  const h = HOLDINGS.find(x => x.code === code);
  if (!h) return;
  const price = getPrice(code);

  JUDGMENTS[code] = {
    code, name: h.name, judgment,
    price_at_judgment: price?.close ?? null,
    change_pct: price?.change_pct ?? null,
    buy_price: h.buy_price ?? null,
    stop_loss: h.stop_loss ?? null,
    target: h.target ?? null,
    type: h.type ?? null,
    judged_at: new Date().toISOString(),
  };
  LS.set(K.judgments, JUDGMENTS);
  renderHoldings();

  // 次の未判定銘柄へスクロール
  setTimeout(() => {
    const next = HOLDINGS.find(x => !JUDGMENTS[x.code]);
    if (next) {
      const el = document.getElementById(`card-${next.code}`);
      if (el) el.scrollIntoView({behavior: "smooth", block: "center"});
    } else {
      // 全銘柄判定完了 → ③に自動移行 + 計画生成準備
      setTimeout(() => {
        document.getElementById("secHoldings").classList.remove("open");
        document.getElementById("secPlan").classList.add("open");
        document.getElementById("numPlan").classList.add("active");
        toast("✅ 全銘柄判定完了！");
        renderPlanInitial();
      }, 300);
    }
  }, 100);
}

function resetJudgment(code){
  delete JUDGMENTS[code];
  LS.set(K.judgments, JUDGMENTS);
  renderHoldings();
}

function addManualHolding(){
  const code = document.getElementById("addCode").value.trim();
  const name = document.getElementById("addName").value.trim();
  const stop = parseFloat(document.getElementById("addStop").value) || null;
  if (!code || !name) { toast("⚠️ コードと銘柄名は必須"); return; }
  const list = LS.get(K.manual_holdings, []);
  if (list.some(h => h.code === code)) { toast("⚠️ 既に追加済み"); return; }
  list.push({code, name, stop_loss: stop, type: "spot"});
  LS.set(K.manual_holdings, list);
  toast(`✅ ${name} を追加`);
  loadHoldings();
}

function syncFromV1(){
  cache.delete(URLS.latest_prices);
  loadHoldings();
  toast("🔄 再読込完了");
}

async function generatePlan(){
  const apiKey = LS.raw(K.api_claude);
  if (!apiKey || !apiKey.trim()) {
    document.getElementById("bodyPlan").innerHTML = `
      <div class="plan-error">
        ⚠️ Claude API キーが未設定です<br>
        画面右上の <b>⚙️ 設定</b> から登録してください。
      </div>
      <button class="plan-gen-btn" onclick="openSettings()" style="margin-top:10px;">
        ⚙️ 設定を開く
      </button>
    `;
    return;
  }

  // ローディング
  document.getElementById("bodyPlan").innerHTML = `
    <div class="loading" style="padding:24px 12px;justify-content:center;">
      Claude が今日の方針を考えています...
    </div>
  `;

  try {
    const prompt = buildPlanPrompt();
    const text = await callClaude(apiKey, prompt);
    PLAN_TEXT = text;

    // localStorage キャッシュ
    LS.set(K.last_plan, {
      date: TODAY,
      text,
      generated_at: new Date().toISOString(),
    });

    showPlan(text, new Date().toISOString());
  } catch(e) {
    console.error("plan generation failed:", e);
    document.getElementById("bodyPlan").innerHTML = `
      <div class="plan-error">
        ⚠️ 計画生成に失敗しました<br>
        ${escapeHtml(e.message)}
      </div>
      <button class="plan-gen-btn" onclick="generatePlan()" style="margin-top:10px;">
        🔄 再試行
      </button>
    `;
    document.getElementById("badgePlan").textContent = "❌";
    document.getElementById("badgePlan").className = "sec-badge error";
  }
}

function showPlan(text, generatedAt){
  const dt = new Date(generatedAt);
  const dtStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
  document.getElementById("bodyPlan").innerHTML = `
    <div class="plan-text">${escapeHtml(text)}</div>
    <div class="plan-meta">🧠 ${CLAUDE_MODEL} · ${dtStr}</div>
    <button class="plan-gen-btn" onclick="generatePlan()" style="margin-top:10px;background:var(--s2);color:var(--t2);">
      🔄 再生成
    </button>
  `;
  document.getElementById("badgePlan").textContent = "✓ 生成済";
  document.getElementById("badgePlan").className = "sec-badge done";
  document.getElementById("numPlan").classList.remove("active");
  document.getElementById("numPlan").classList.add("done");
  document.getElementById("numPlan").textContent = "✓";
  document.getElementById("previewPlan").textContent = text.slice(0, 60) + (text.length > 60 ? "..." : "");
  document.getElementById("doneBtn").disabled = false;
}

function buildPlanPrompt(){
  const judgmentsList = HOLDINGS.map(h => {
    const j = JUDGMENTS[h.code];
    if (!j) return null;
    const labels = {hold:"継続保有", consider_cut:"損切検討", consider_sell:"利確検討"};
    const code5 = code4to5(h.code);
    const price = getPrice(h.code);
    const pnlPct = (price && h.buy_price) ? ((price.close / h.buy_price - 1) * 100).toFixed(1) : null;
    return {
      code: code5, name: h.name, judgment: labels[j.judgment],
      buy_price: h.buy_price, current: price?.close, pnl_pct: pnlPct,
      stop_loss: h.stop_loss, target: h.target, type: h.type,
    };
  }).filter(Boolean);

  const macroSummary = MACRO ? {
    regime: MACRO.regime,
    summary: MACRO.summary,
    hv_20d: MACRO.hv_20d,
    ma25_dev: MACRO.ma25_dev,
    trend: MACRO.trend,
    reasons: MACRO.reasons,
  } : null;

  return `あなたはひろき様の専属トレーディング・コーチです。
スイングトレーダーであるひろき様が朝会で記録した本日の判断を踏まえ、
**今日一日の具体的な行動計画**を簡潔にアドバイスしてください。

## 📊 マクロ状態
${macroSummary ? "```json\n" + JSON.stringify(macroSummary, null, 2) + "\n```" : "(データなし)"}

## 💼 保有銘柄と本日の判断
${judgmentsList.length > 0 ? "```json\n" + JSON.stringify(judgmentsList, null, 2) + "\n```" : "(保有なし)"}

## 📅 日付
${TODAY} (${WD})

## 🎯 出力フォーマット（必ず守ってください）

# 🌅 今日の方針

(1〜2行でマクロ環境を踏まえた基本スタンス)

## ⚡ 優先アクション
(本日中にやるべきことを3つまで、優先順に)
1. ...
2. ...

## 💼 銘柄別の具体策
(各保有銘柄について、判断を踏まえた具体的アクション)
- **[銘柄名]**: ...

## ⚠️ 注意点
(マクロ・個別銘柄から見て特に気をつけること)
- ...

## 🚪 撤退ライン
(どうなったら今日の計画を見直すか)
- ...

---

【執筆ルール】
- 全体で 400〜600 字程度に収める
- マクロ "${macroSummary?.regime}" を必ず考慮（特に STORM/HALT 時はサイズ縮小強調）
- 「損切検討」「利確検討」と判断した銘柄には、具体的な価格水準で行動指示
- 抽象論ではなく、本日 9:00 から取れる具体的アクションで
- 不確実性を避けず、リスクは率直に明示`;
}

async function callClaude(apiKey, prompt){
  const r = await fetch(CLAUDE_API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1500,
      messages: [{role: "user", content: prompt}],
    }),
  });

  if (!r.ok) {
    let errMsg = `HTTP ${r.status}`;
    try {
      const err = await r.json();
      errMsg = err.error?.message || errMsg;
    } catch {}
    throw new Error(errMsg);
  }

  const data = await r.json();
  const text = data.content?.map(b => b.text || "").join("") || "";
  if (!text) throw new Error("Claude が空のレスポンスを返しました");
  return text;
}

async function completeSession(){
  if (SESSION_COMPLETED) {
    toast("✅ 既に保存済み");
    return;
  }

  const judgmentsList = HOLDINGS.map(h => JUDGMENTS[h.code]).filter(Boolean);
  if (judgmentsList.length === 0 && HOLDINGS.length > 0) {
    toast("⚠️ まだ判定が完了していません");
    return;
  }

  const session = {
    date: TODAY,
    completed_at: new Date().toISOString(),
    macro: MACRO ? {
      regime: MACRO.regime,
      hv_20d: MACRO.hv_20d,
      ma25_dev: MACRO.ma25_dev,
      trend: MACRO.trend,
      summary: MACRO.summary,
    } : null,
    judgments: judgmentsList,
    plan_text: PLAN_TEXT || null,
  };

  try {
    const id = await dbAdd("daily_sessions", session);
    SESSION_COMPLETED = true;
    const btn = document.getElementById("doneBtn");
    btn.classList.add("completed");
    btn.textContent = "✅ 朝会を保存しました";
    btn.disabled = true;
    toast(`💾 保存完了 (ID: ${id})`);
  } catch(e) {
    console.error("save session failed:", e);
    toast("⚠️ 保存失敗: " + e.message);
  }
}

document.getElementById("settingsBtn").onclick = openSettings;

async function openSettings(){
  // API キー欄に既存値をマスク表示
  const ck = LS.raw(K.api_claude) || "";
  const gk = LS.raw(K.api_claude) || "";
  document.getElementById("inpClaudeKey").value = ck;
  document.getElementById("inpGeminiKey").value = LS.raw(K.api_gemini) || "";

  document.getElementById("statClaudeKey").textContent = ck ? "✅ 設定済" : "⚠️ 未設定";
  document.getElementById("statClaudeKey").className = "api-status " + (ck ? "set" : "unset");
  const gk2 = LS.raw(K.api_gemini) || "";
  document.getElementById("statGeminiKey").textContent = gk2 ? "✅ 設定済" : "未設定（任意）";
  document.getElementById("statGeminiKey").className = "api-status " + (gk2 ? "set" : "unset");

  // 履歴を読込
  await renderHistory();

  document.getElementById("settingsModal").classList.add("on");
}

function closeSettings(){
  document.getElementById("settingsModal").classList.remove("on");
}

document.getElementById("settingsModal").onclick = (e) => {
  if (e.target.id === "settingsModal") closeSettings();
};

function saveKeys(){
  const ck = document.getElementById("inpClaudeKey").value.trim();
  const gk = document.getElementById("inpGeminiKey").value.trim();

  if (ck) localStorage.setItem(K.api_claude, ck);
  else localStorage.removeItem(K.api_claude);

  if (gk) localStorage.setItem(K.api_gemini, gk);
  else localStorage.removeItem(K.api_gemini);

  toast("✅ API キーを保存しました");
  document.getElementById("statClaudeKey").textContent = ck ? "✅ 設定済" : "⚠️ 未設定";
  document.getElementById("statClaudeKey").className = "api-status " + (ck ? "set" : "unset");
}

async function renderHistory(){
  const wrap = document.getElementById("historyList");
  try {
    const sessions = await dbAll("daily_sessions");
    if (sessions.length === 0) {
      wrap.innerHTML = `<div style="font-size:11px;color:var(--t3);text-align:center;padding:8px;">まだ履歴がありません</div>`;
      return;
    }
    const recent = sessions.sort((a,b) => b.completed_at.localeCompare(a.completed_at)).slice(0,10);
    wrap.innerHTML = recent.map(s => {
      const j = s.judgments || [];
      const counts = {hold:0, consider_cut:0, consider_sell:0};
      j.forEach(x => counts[x.judgment] = (counts[x.judgment]||0) + 1);
      return `
        <div class="history-item">
          <div class="hi-date">${s.date} · ${(s.macro?.regime || "?").toUpperCase()}</div>
          <div class="hi-summary">
            判定 ${j.length}件: ✋${counts.hold} ⛔${counts.consider_cut} 💰${counts.consider_sell}
            ${s.plan_text ? '· 🧠計画あり' : ''}
          </div>
        </div>
      `;
    }).join("");
  } catch(e) {
    wrap.innerHTML = `<div class="error">履歴取得エラー: ${escapeHtml(e.message)}</div>`;
  }
}

async function exportHistory(){
  try {
    const sessions = await dbAll("daily_sessions");
    const blob = new Blob([JSON.stringify(sessions, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `morning-history-${TODAY}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast(`✅ ${sessions.length}件をエクスポート`);
  } catch(e) {
    toast("⚠️ エクスポート失敗: " + e.message);
  }
}

function clearCache(){
  cache.clear();
  toast("🔄 キャッシュをクリアしました");
  closeSettings();
  // 全部リロード
  location.reload();
}

function resetTodaySession(){
  if (!confirm("当日の判定と計画をリセットしますか？\n（IndexedDB の履歴は消えません）")) return;
  JUDGMENTS = {_date: TODAY};
  PLAN_TEXT = "";
  SESSION_COMPLETED = false;
  LS.set(K.judgments, JUDGMENTS);
  localStorage.removeItem(K.last_plan);
  toast("🗑 当日の判定をリセット");
  closeSettings();
  // 再描画
  renderHoldings();
  document.getElementById("bodyPlan").innerHTML =
    `<div class="plan-empty">②保有銘柄の判定を完了すると、Claude が今日の計画を生成します</div>`;
  document.getElementById("badgePlan").className = "sec-badge";
  document.getElementById("badgePlan").textContent = "-";
  document.getElementById("numPlan").classList.remove("done","active");
  document.getElementById("numPlan").textContent = "3";
  document.getElementById("doneBtn").disabled = true;
  document.getElementById("doneBtn").classList.remove("completed");
  document.getElementById("doneBtn").textContent = "💾 朝会を完了する";
}
